<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paradoks - Kendi Evrenine Hoş Geldin</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arcade-cyan: #00ffff;
            --arcade-magenta: #ff00ff;
            --arcade-yellow: #ffea00;
            --dark-bg: #0b001a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; min-height: 100vh;
            background-color: var(--dark-bg);
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.15) 1px, transparent 1px);
            background-size: 40px 40px; background-position: center bottom;
            color: white; font-family: 'Orbitron', sans-serif;
            overflow-x: hidden; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }

        @keyframes moveGrid {
            0% { transform: translateY(0) translateZ(0); }
            100% { transform: translateY(40px) translateZ(0); }
        }

        .bg-anim {
            position: fixed; top: -40px; left: 0; width: 100%; height: calc(100% + 40px);
            background-image: inherit; background-size: inherit;
            animation: moveGrid 3s linear infinite; z-index: -1; opacity: 0.6;
        }

        .container {
            width: 90%; max-width: 500px;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 4vh; padding-bottom: 5vh; z-index: 10;
        }

        .title-arcade {
            font-family: 'Press Start 2P', cursive; font-size: 1.5rem;
            color: var(--arcade-yellow); text-shadow: 3px 3px 0px var(--arcade-magenta);
            margin-bottom: 8px; text-align: center; line-height: 1.4;
        }

        /* 🎯 ALT SATIRA KAYMAYI ENGELLEYEN VE MOBİLDE KÜÇÜLEN TEK SATIR STİL */
        .subtitle {
            color: var(--arcade-cyan); 
            font-size: clamp(0.55rem, 3.2vw, 0.85rem); 
            font-weight: 800;
            margin-bottom: 20px; 
            text-shadow: 0 0 10px var(--arcade-cyan);
            letter-spacing: 1px; 
            text-transform: uppercase;
            white-space: nowrap; 
            width: 100%;
            text-align: center;
        }

        .card-3d-wrapper { width: 100%; perspective: 900px; margin-bottom: 20px; touch-action: none; }

        .image-frame {
            width: 100%; border: 4px solid var(--arcade-cyan); border-radius: 15px;
            box-shadow: 0 0 20px var(--arcade-cyan), 0 0 40px var(--arcade-magenta) inset;
            background-color: #000; padding: 5px; box-sizing: border-box; position: relative;
            transform-style: preserve-3d; transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
            will-change: transform;
        }

        #bg-image { width: 100%; height: auto; border-radius: 10px; display: block; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; transform: translateZ(0px); }
        #cutout-image, #overlay-image { position: absolute; top: 5px; left: 5px; width: calc(100% - 10px); height: calc(100% - 10px); border-radius: 10px; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; }
        #cutout-image { transform: translateZ(25px) scale(1.05); z-index: 2; }
        #overlay-image { transform: translateZ(45px); z-index: 3; }

        .holo-glare {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 10px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 0, 255, 0.2) 35%, rgba(0, 255, 255, 0.2) 70%, rgba(255, 255, 255, 0.4) 100%);
            opacity: 0; mix-blend-mode: color-dodge; pointer-events: none; transition: opacity 0.3s ease; z-index: 5; transform: translateZ(50px);
        }

        .loading-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Press Start 2P', cursive; font-size: 0.8rem; color: var(--arcade-magenta); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .btn-group { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .btn-buy-physical { background: linear-gradient(90deg, #ffcc00, #ff6600); color: #000; font-family: Arial, sans-serif; font-weight: 900; font-size: 1.05rem; padding: 14px 20px; border: 2px solid white; border-radius: 30px; box-shadow: 0 0 15px #ffcc00; cursor: pointer; width: 85%; text-transform: uppercase; transition: transform 0.1s; text-decoration: none; text-align: center; display: flex; justify-content: center; align-items: center; gap: 10px; animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 10px #ffcc00; } 50% { box-shadow: 0 0 25px #ff6600, inset 0 0 10px #ffcc00; } 100% { box-shadow: 0 0 10px #ffcc00; } }
        .btn-buy-physical:active { transform: scale(0.95); }
        .btn-download { background: linear-gradient(90deg, var(--arcade-magenta), #cc00cc); color: white; font-family: Arial, sans-serif; font-weight: 900; font-size: 1rem; padding: 12px 20px; border: 2px solid white; border-radius: 30px; box-shadow: 0 0 15px var(--arcade-magenta); cursor: pointer; width: 85%; text-transform: uppercase; transition: transform 0.1s; text-decoration: none; text-align: center; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-download-photo { background: rgba(0, 0, 0, 0.6); color: var(--arcade-cyan); font-family: Arial, sans-serif; font-weight: 900; font-size: 0.95rem; padding: 12px 20px; border: 2px solid var(--arcade-cyan); border-radius: 30px; box-shadow: 0 0 10px rgba(0, 255, 255, 0.4); cursor: pointer; width: 85%; text-transform: uppercase; transition: transform 0.1s; text-decoration: none; text-align: center; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-download:active, .btn-download-photo:active { transform: scale(0.95); }
        .download-icon { width: 20px; height: 20px; fill: currentColor; }
        .hint { margin-top: 15px; font-size: 0.8rem; color: #aaa; text-align: center; line-height: 1.5; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <div class="bg-anim"></div>

    <div class="container">
        <h1 class="title-arcade">MISSION<br>COMPLETE</h1>
        <div class="subtitle">✨ KARTINI İNCELEMEK İÇİN SÜRÜKLE ✨</div>

        <div class="card-3d-wrapper" id="card-wrapper">
            <div class="image-frame" id="image-frame">
                <div class="loading-text" id="loading-indicator">YÜKLENİYOR...</div>
                <img id="bg-image" src="" alt="Arka Plan">
                <img id="cutout-image" src="" alt="3D Karakter">
                <img id="overlay-image" src="" alt="Arayüz Katmanı">
                <div class="holo-glare" id="holo-glare"></div>
            </div>
        </div>

        <div class="btn-group">
            <a id="buy-physical-btn" class="btn-buy-physical" href="#" target="_blank">📦 KARTI FİZİKSEL SATIN AL</a>
            <a id="download-btn" class="btn-download" href="#" target="_blank">
                <svg class="download-icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                RPG KARTINI İNDİR
            </a>
            <a id="download-photo-btn" class="btn-download-photo" href="#" target="_blank">
                <svg class="download-icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                🖼️ SADECE FOTOĞRAFI İNDİR
            </a>
        </div>
        <p class="hint">İndirme butonları çalışmazsa,<br>görselin üzerine basılı tutarak<br><strong>"Fotoğraflara Kaydet"</strong> diyebilirsin.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // 🔥 HEM SIKIŞTIRILMIŞ BASE64 PARSİNG HEM DE ESKİ PARAMETRE DSTEĞİ
        const compressedData = urlParams.get('d');
        let imageUrl, bgUrl, cutoutUrl, overlayUrl;

        if (compressedData) {
            try {
                // URL Safe Base64 Çözücü
                let base64 = compressedData.replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4) { base64 += '='; }
                const jsonStr = decodeURIComponent(escape(atob(base64)));
                const payload = JSON.parse(jsonStr);

                imageUrl = payload.c;
                bgUrl = payload.b;
                cutoutUrl = payload.t;
                overlayUrl = payload.o;
            } catch (e) {
                console.error("Base64 Veri Çözme Hatası:", e);
            }
        }

        // Eğer Base64 yoksa veya çözülemediyse eski açık parametreleri dene
        if (!imageUrl) {
            imageUrl = urlParams.get('c') || urlParams.get('url');      
            bgUrl = urlParams.get('b') || urlParams.get('photo'); 
            cutoutUrl = urlParams.get('t') || urlParams.get('cutout'); 
            overlayUrl = urlParams.get('o'); 
        }

        const bgElement = document.getElementById('bg-image');
        const cutoutElement = document.getElementById('cutout-image'); 
        const overlayElement = document.getElementById('overlay-image'); 
        
        const downloadBtn = document.getElementById('download-btn');
        const downloadPhotoBtn = document.getElementById('download-photo-btn');
        const buyPhysicalBtn = document.getElementById('buy-physical-btn'); 
        const loadingIndicator = document.getElementById('loading-indicator');

        const SHOPIER_URL = "https://www.shopier.com/paradokskiosk/49269215";

        async function triggerDirectDownload(fileUrl, fileName, btnElement, originalText) {
            if (!fileUrl) return;
            btnElement.innerHTML = "İNDİRİLİYOR...";
            try {
                const response = await fetch(fileUrl, { mode: 'cors' });
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
            } catch (err) { window.open(fileUrl, '_blank'); } 
            finally { setTimeout(() => { btnElement.innerHTML = originalText; }, 1200); }
        }

        if (imageUrl) {
            bgElement.src = bgUrl || imageUrl;
            if (cutoutUrl) cutoutElement.src = cutoutUrl;
            if (overlayUrl) overlayElement.src = overlayUrl;

            let loadedCount = 0;
            const totalImages = (bgUrl ? 1 : 0) + (cutoutUrl ? 1 : 0) + (overlayUrl ? 1 : 0);

            function checkLoad() {
                loadedCount++;
                if (loadedCount >= totalImages || totalImages === 0) {
                    loadingIndicator.style.display = 'none';
                    bgElement.style.opacity = '1';
                    if (cutoutElement.src) cutoutElement.style.opacity = '1';
                    if (overlayElement.src) overlayElement.style.opacity = '1';
                }
            }

            bgElement.onload = checkLoad;
            if (cutoutElement) cutoutElement.onload = checkLoad;
            if (overlayElement) overlayElement.onload = checkLoad;

            setTimeout(() => {
                loadingIndicator.style.display = 'none';
                bgElement.style.opacity = '1';
                if (cutoutElement.src) cutoutElement.style.opacity = '1';
                if (overlayElement.src) overlayElement.style.opacity = '1';
            }, 1000);

            buyPhysicalBtn.addEventListener('click', function(e) {
                e.preventDefault();
                alert("Shopier güvenli ödeme sayfasına yönlendiriliyorsunuz.\n\nSiparişinizin doğru basılabilmesi için lütfen Sipariş Notu kısmına resimdeki #PRDX ile başlayan kart kodunuzu yazmayı unutmayın!");
                window.open(`${SHOPIER_URL}?image_url=${encodeURIComponent(imageUrl)}`, '_blank');
            });

            downloadBtn.addEventListener('click', function(e) {
                e.preventDefault();
                triggerDirectDownload(imageUrl, "Paradoks_RPG_Karti.jpg", downloadBtn, "RPG KARTINI İNDİR");
            });

            downloadPhotoBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const targetPhoto = bgUrl ? bgUrl : imageUrl;
                triggerDirectDownload(targetPhoto, "Paradoks_AI_Fotograf.jpg", downloadPhotoBtn, "🖼️ SADECE FOTOĞRAFI İNDİR");
            });

        } else {
            loadingIndicator.innerText = "FOTOĞRAF BULUNAMADI";
            loadingIndicator.style.color = "red";
            downloadBtn.style.display = "none";
            downloadPhotoBtn.style.display = "none";
            buyPhysicalBtn.style.display = "none";
        }

        const wrapper = document.getElementById('card-wrapper');
        const frame = document.getElementById('image-frame');
        const glare = document.getElementById('holo-glare');

        function handleMove(x, y) {
            const rect = wrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const mouseX = x - centerX;
            const mouseY = y - centerY;
            
            const rotateX = (-mouseY / (rect.height / 2)) * 25;
            const rotateY = (mouseX / (rect.width / 2)) * 25;
            
            frame.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.03, 1.03, 1.03)`;
            
            if (cutoutElement) {
                const charMoveX = (mouseX / (rect.width / 2)) * -12; 
                const charMoveY = (mouseY / (rect.height / 2)) * -12; 
                cutoutElement.style.transform = `translateZ(25px) translateX(${charMoveX}px) translateY(${charMoveY}px) scale(1.05)`;
            }
            
            const glareX = ((x - rect.left) / rect.width) * 100;
            const glareY = ((y - rect.top) / rect.height) * 100;
            glare.style.opacity = '0.65';
            glare.style.background = `radial-gradient(circle at ${glareX}% ${glareY}%, rgba(255,255,255,0.8) 0%, rgba(255,0,255,0.3) 30%, rgba(0,255,255,0.1) 60%, transparent 80%)`;
        }

        function resetCard() {
            frame.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            glare.style.opacity = '0';
            if (cutoutElement) {
                cutoutElement.style.transform = `translateZ(25px) translateX(0px) translateY(0px) scale(1.05)`;
            }
        }

        wrapper.addEventListener('touchmove', (e) => { if (e.touches.length > 0) handleMove(e.touches[0].clientX, e.touches[0].clientY); });
        wrapper.addEventListener('touchend', resetCard);
        wrapper.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        wrapper.addEventListener('mouseleave', resetCard);
    </script>
</body>
</html>
