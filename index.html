<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paradoks - Kendi Evrenine Hoş Geldin</title>
    <!-- Kiosk ile aynı Arcade Fontları -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arcade-cyan: #00ffff;
            --arcade-magenta: #ff00ff;
            --arcade-yellow: #ffea00;
            --dark-bg: #0b001a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
            background-color: var(--dark-bg);
            /* Retro 3D Grid Arka Plan */
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center bottom;
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* Arka plan ızgarasını hareket ettirme animasyonu */
        @keyframes moveGrid {
            0% { transform: translateY(0) translateZ(0); }
            100% { transform: translateY(40px) translateZ(0); }
        }

        .bg-anim {
            position: fixed; /* Mobilde scroll yaparken arka plan kaymasın */
            top: -40px; left: 0; width: 100%; height: calc(100% + 40px);
            background-image: inherit;
            background-size: inherit;
            animation: moveGrid 3s linear infinite;
            z-index: -1;
            opacity: 0.6;
        }

        .container {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 5vh;
            padding-bottom: 5vh;
            z-index: 10;
        }

        /* --- BAŞLIKLAR --- */
        .title-arcade {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: var(--arcade-yellow);
            text-shadow: 3px 3px 0px var(--arcade-magenta);
            margin-bottom: 10px;
            text-align: center;
            line-height: 1.4;
        }

        .subtitle {
            color: var(--arcade-cyan);
            font-size: 1rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--arcade-cyan);
            letter-spacing: 1px;
        }

        /* --- FOTOĞRAF KUTUSU --- */
        .image-frame {
            width: 100%;
            border: 4px solid var(--arcade-cyan);
            border-radius: 15px;
            box-shadow: 0 0 20px var(--arcade-cyan), 0 0 40px var(--arcade-magenta) inset;
            background-color: #000;
            padding: 5px;
            box-sizing: border-box;
            margin-bottom: 30px;
            position: relative;
        }

        #user-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Yükleniyor animasyonu */
        .loading-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            color: var(--arcade-magenta);
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* --- İNDİRME BUTONU --- */
        .btn-download {
            background: linear-gradient(90deg, var(--arcade-magenta), #cc00cc);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            padding: 15px 30px;
            border: 2px solid white;
            border-radius: 30px;
            box-shadow: 0 0 15px var(--arcade-magenta);
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.1s, box-shadow 0.1s;
            text-decoration: none;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-download:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px var(--arcade-magenta);
        }

        /* İndirme ikonu (SVG) */
        .download-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .hint {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="bg-anim"></div>

    <div class="container">
        <h1 class="title-arcade">LEVEL<br>COMPLETE</h1>
        <div class="subtitle">Yeni profil fotoğrafın hazır!</div>

        <div class="image-frame" id="image-frame">
            <div class="loading-text" id="loading-indicator">YÜKLENİYOR...</div>
            <img id="user-image" src="" alt="Paradoks Sonuç">
        </div>

        <a id="download-btn" class="btn-download" href="#" download="Paradoks_Gelecegin.jpg">
            <svg class="download-icon" viewBox="0 0 24 24">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            GALERİYE KAYDET
        </a>

        <p class="hint">İndirme butonu çalışmazsa,<br>fotoğrafın üzerine basılı tutarak<br><strong>"Fotoğraflara Kaydet"</strong> diyebilirsin.</p>
    </div>

    <script>
        // 1. URL'den 'url' parametresini al
        const urlParams = new URLSearchParams(window.location.search);
        const imageUrl = urlParams.get('url');

        const imgElement = document.getElementById('user-image');
        const downloadBtn = document.getElementById('download-btn');
        const loadingIndicator = document.getElementById('loading-indicator');

        if (imageUrl) {
            // Resmi ekrana bas
            imgElement.src = imageUrl;

            // Resim yüklendiğinde loading yazısını kaldır
            imgElement.onload = function() {
                loadingIndicator.style.display = 'none';
                imgElement.style.opacity = '1';
            };

            // 🎯 BLOB HACK: Doğrudan İndirme İşlemi
            downloadBtn.addEventListener('click', async function(e) {
                e.preventDefault(); // Klasik link açma davranışını durdur
                
                // UX: Müşteri butona bastığını anlasın diye yazıyı değiştiriyoruz
                const originalText = downloadBtn.innerHTML;
                downloadBtn.innerHTML = "İNDİRİLİYOR...";

                try {
                    // Resmi arka planda (Blob veri olarak) indir
                    const response = await fetch(imageUrl);
                    const blob = await response.blob();
                    
                    // Veriyi yerel bir tarayıcı linkine (Object URL) çevir
                    const blobUrl = window.URL.createObjectURL(blob);
                    
                    // Görünmez bir link oluşturup ona tıklatıyoruz (Zorla İndirme)
                    const tempLink = document.createElement('a');
                    tempLink.style.display = 'none';
                    tempLink.href = blobUrl;
                    tempLink.download = "Paradoks_Kiosk_Hatirasi.jpg"; // İnecek dosyanın adı
                    document.body.appendChild(tempLink);
                    tempLink.click();
                    
                    // Hafızayı temizle
                    window.URL.revokeObjectURL(blobUrl);
                    document.body.removeChild(tempLink);
                } catch (error) {
                    // HATA YÖNETİMİ: Eğer Firebase (CORS) bu arka plan indirmesini engellerse
                    // B Planı: Resmi yeni sekmede aç (Hint yazısı burada hayat kurtarır)
                    console.warn("Zorla indirme engellendi, yeni sekmede açılıyor:", error);
                    window.open(imageUrl, '_blank');
                } finally {
                    // 1 saniye sonra buton yazısını eski haline döndür
                    setTimeout(() => { downloadBtn.innerHTML = originalText; }, 1000);
                }
            });

        } else {
            loadingIndicator.innerText = "FOTOĞRAF BULUNAMADI";
            loadingIndicator.style.color = "red";
            downloadBtn.style.display = "none";
        }
    </script>
</body>
</html>
