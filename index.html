<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paradoks - Kendi Evrenine Hoş Geldin</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arcade-cyan: #00ffff;
            --arcade-magenta: #ff00ff;
            --arcade-yellow: #ffea00;
            --dark-bg: #0b001a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
            background-color: var(--dark-bg);
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center bottom;
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        @keyframes moveGrid {
            0% { transform: translateY(0) translateZ(0); }
            100% { transform: translateY(40px) translateZ(0); }
        }

        .bg-anim {
            position: fixed; 
            top: -40px; left: 0; width: 100%; height: calc(100% + 40px);
            background-image: inherit;
            background-size: inherit;
            animation: moveGrid 3s linear infinite;
            z-index: -1;
            opacity: 0.6;
        }

        .container {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 4vh;
            padding-bottom: 5vh;
            z-index: 10;
        }

        .title-arcade {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: var(--arcade-yellow);
            text-shadow: 3px 3px 0px var(--arcade-magenta);
            margin-bottom: 8px;
            text-align: center;
            line-height: 1.4;
        }

        .subtitle {
            color: var(--arcade-cyan);
            font-size: 0.95rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--arcade-cyan);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- 🔥 3D KART KONTEYNERİ & EFEKTLERİ --- */
        .card-3d-wrapper {
            width: 100%;
            perspective: 1000px; 
            margin-bottom: 20px;
            touch-action: none; 
        }

        .image-frame {
            width: 100%;
            border: 4px solid var(--arcade-cyan);
            border-radius: 15px;
            box-shadow: 0 0 20px var(--arcade-cyan), 0 0 40px var(--arcade-magenta) inset;
            background-color: #000;
            padding: 5px;
            box-sizing: border-box;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
            will-change: transform;
        }

        /* 🥪 1. KATMAN: EN ARKA (Orijinal Kart) */
        #user-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            transform: translateZ(0px);
        }

        /* 🥪 ORTAK STİL: 2. ve 3. Katman Hizalaması */
        #cutout-image, #card-overlay {
            position: absolute;
            top: 5px; left: 5px;
            width: calc(100% - 10px); height: calc(100% - 10px);
            border-radius: 10px;
            pointer-events: none; 
        }

        /* 🥪 2. KATMAN: ORTA (Tüm Vücut Şeffaf Karakter) */
        #cutout-image {
            transform: translateZ(25px); /* Ortada havada asılı durur */
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* 🥪 3. KATMAN: EN ÖN (Arayüz ve Stat Çubukları) */
        #card-overlay {
            transform: translateZ(45px); /* En önde durur */
            z-index: 3;
            opacity: 0;
            transition: opacity 0.5s ease;
            /* HARİKA MANTIK: Resmin sadece üst (0-11%) ve alt (65-100%) bölgesini gösterip ortayı karakterin fırlaması için şeffaf bırakır! */
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 11%, rgba(0,0,0,0) 13%, rgba(0,0,0,0) 63%, rgba(0,0,0,1) 65%, rgba(0,0,0,1) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 11%, rgba(0,0,0,0) 13%, rgba(0,0,0,0) 63%, rgba(0,0,0,1) 65%, rgba(0,0,0,1) 100%);
        }

        /* 🔥 DİNAMİK HOLOGRAM / PARILTI KATMANI */
        .holo-glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 10px;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.4) 0%,
                rgba(255, 0, 255, 0.2) 35%,
                rgba(0, 255, 255, 0.2) 70%,
                rgba(255, 255, 255, 0.4) 100%
            );
            opacity: 0; 
            mix-blend-mode: color-dodge;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 5;
            transform: translateZ(50px);
        }

        .loading-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            color: var(--arcade-magenta);
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .btn-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn-buy-physical {
            background: linear-gradient(90deg, #ffcc00, #ff6600);
            color: #000;
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif; 
            font-weight: 900;
            font-size: 1.05rem;
            padding: 14px 20px;
            border: 2px solid white;
            border-radius: 30px;
            box-shadow: 0 0 15px #ffcc00;
            cursor: pointer;
            width: 85%;
            margin: 0 auto;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s;
            text-decoration: none;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 10px #ffcc00; }
            50% { box-shadow: 0 0 25px #ff6600, inset 0 0 10px #ffcc00; }
            100% { box-shadow: 0 0 10px #ffcc00; }
        }

        .btn-buy-physical:active { transform: scale(0.95); }

        .btn-download {
            background: linear-gradient(90deg, var(--arcade-magenta), #cc00cc);
            color: white;
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif; 
            font-weight: 900;
            font-size: 1rem;
            padding: 12px 20px;
            border: 2px solid white;
            border-radius: 30px;
            box-shadow: 0 0 15px var(--arcade-magenta);
            cursor: pointer;
            width: 85%;
            margin: 0 auto;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s, box-shadow 0.1s;
            text-decoration: none;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
        }

        .btn-download-photo {
            background: rgba(0, 0, 0, 0.6);
            color: var(--arcade-cyan);
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif; 
            font-weight: 900;
            font-size: 0.95rem;
            padding: 12px 20px;
            border: 2px solid var(--arcade-cyan);
            border-radius: 30px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
            cursor: pointer;
            width: 85%;
            margin: 0 auto;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s, box-shadow 0.1s;
            text-decoration: none;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
        }

        .btn-download:active, .btn-download-photo:active { transform: scale(0.95); }

        .download-icon { width: 20px; height: 20px; fill: currentColor; }

        .hint {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div class="bg-anim"></div>

    <div class="container">
        <h1 class="title-arcade">LEVEL<br>COMPLETE</h1>
        <div class="subtitle">✨ KARTINI İNCELEMEK İÇİN SÜRÜKLE ✨</div>

        <!-- 3D WRAPPER KATMANI -->
        <div class="card-3d-wrapper" id="card-wrapper">
            <div class="image-frame" id="image-frame">
                <div class="loading-text" id="loading-indicator">YÜKLENİYOR...</div>
                
                <!-- 🥪 1. Katman: En Arka (Ana Kart) -->
                <img id="user-image" src="" alt="Paradoks Sonuç">
                
                <!-- 🥪 2. Katman: Orta (Tüm Vücut Şeffaf Karakter) -->
                <img id="cutout-image" src="" alt="3D Karakter">

                <!-- 🥪 3. Katman: En Ön (Sadece Yazılar ve Stat Çubukları) -->
                <img id="card-overlay" src="" alt="Arayüz Katmanı">
                
                <!-- 4. Katman: Hologram Parlaması -->
                <div class="holo-glare" id="holo-glare"></div>
            </div>
        </div>

        <div class="btn-group">
            <a id="buy-physical-btn" class="btn-buy-physical" href="#" target="_blank">
                📦 KARTI FİZİKSEL SATIN AL
            </a>

            <a id="download-btn" class="btn-download" href="#" target="_blank">
                <svg class="download-icon" viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
                RPG KARTINI İNDİR
            </a>

            <a id="download-photo-btn" class="btn-download-photo" href="#" target="_blank">
                <svg class="download-icon" viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
                🖼️ SADECE FOTOĞRAFI İNDİR
            </a>
        </div>

        <p class="hint">İndirme butonları çalışmazsa,<br>görselin üzerine basılı tutarak<br><strong>"Fotoğraflara Kaydet"</strong> diyebilirsin.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imageUrl = urlParams.get('url');      
        const rawPhotoUrl = urlParams.get('photo'); 
        const cutoutUrl = urlParams.get('cutout'); 

        const imgElement = document.getElementById('user-image');
        const cutoutElement = document.getElementById('cutout-image'); 
        const overlayElement = document.getElementById('card-overlay'); // 🔥 YENİ

        const downloadBtn = document.getElementById('download-btn');
        const downloadPhotoBtn = document.getElementById('download-photo-btn');
        const buyPhysicalBtn = document.getElementById('buy-physical-btn'); 
        const loadingIndicator = document.getElementById('loading-indicator');

        const SHOPIER_URL = "https://www.shopier.com/SiparisLinkinBurayaGelecek";

        async function triggerDirectDownload(fileUrl, fileName, btnElement, originalText) {
            if (!fileUrl) return;
            btnElement.innerHTML = "İNDİRİLİYOR...";
            try {
                const response = await fetch(fileUrl, { mode: 'cors' });
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
            } catch (err) {
                window.open(fileUrl, '_blank');
            } finally {
                setTimeout(() => { btnElement.innerHTML = originalText; }, 1200);
            }
        }

        if (imageUrl) {
            imgElement.src = imageUrl;
            overlayElement.src = imageUrl; // 🔥 Aynı resmi öndeki maske katmanına da yüklüyoruz!

            imgElement.onload = function() {
                loadingIndicator.style.display = 'none';
                imgElement.style.opacity = '1';
                overlayElement.style.opacity = '1';
            };

            // Şeffaf Karakteri Yükle
            if (cutoutUrl) {
                cutoutElement.src = cutoutUrl;
                cutoutElement.onload = function() {
                    cutoutElement.style.opacity = '1';
                };
            }

            buyPhysicalBtn.addEventListener('click', function(e) {
                e.preventDefault();
                alert("Shopier güvenli ödeme sayfasına yönlendiriliyorsunuz.\n\nSiparişinizin doğru basılabilmesi için lütfen Sipariş Notu kısmına resimdeki #PRDX ile başlayan kart kodunuzu yazmayı unutmayın!");
                const finalShopierUrl = `${SHOPIER_URL}?image_url=${encodeURIComponent(imageUrl)}`;
                window.open(finalShopierUrl, '_blank');
            });

            downloadBtn.addEventListener('click', function(e) {
                e.preventDefault();
                triggerDirectDownload(imageUrl, "Paradoks_RPG_Karti.jpg", downloadBtn, "RPG KARTINI İNDİR");
            });

            downloadPhotoBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const targetPhoto = rawPhotoUrl ? rawPhotoUrl : imageUrl;
                triggerDirectDownload(targetPhoto, "Paradoks_AI_Fotograf.jpg", downloadPhotoBtn, "🖼️ SADECE FOTOĞRAFI İNDİR");
            });

        } else {
            loadingIndicator.innerText = "FOTOĞRAF BULUNAMADI";
            loadingIndicator.style.color = "red";
            downloadBtn.style.display = "none";
            downloadPhotoBtn.style.display = "none";
            buyPhysicalBtn.style.display = "none";
        }

        /* --- 🔥 3D DÖNÜŞ VE İNCELEME JAVASCRIPT KODLARI --- */
        const wrapper = document.getElementById('card-wrapper');
        const frame = document.getElementById('image-frame');
        const glare = document.getElementById('holo-glare');

        function handleMove(x, y) {
            const rect = wrapper.getBoundingClientRect();
            
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const mouseX = x - centerX;
            const mouseY = y - centerY;
            
            const rotateX = (-mouseY / (rect.height / 2)) * 25;
            const rotateY = (mouseX / (rect.width / 2)) * 25;
            
            frame.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.03, 1.03, 1.03)`;
            
            const glareX = ((x - rect.left) / rect.width) * 100;
            const glareY = ((y - rect.top) / rect.height) * 100;
            
            glare.style.opacity = '0.65';
            glare.style.background = `radial-gradient(circle at ${glareX}% ${glareY}%, rgba(255,255,255,0.8) 0%, rgba(255,0,255,0.3) 30%, rgba(0,255,255,0.1) 60%, transparent 80%)`;
        }

        function resetCard() {
            frame.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            glare.style.opacity = '0';
        }

        wrapper.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        wrapper.addEventListener('touchend', resetCard);

        wrapper.addEventListener('mousemove', (e) => {
            handleMove(e.clientX, e.clientY);
        });

        wrapper.addEventListener('mouseleave', resetCard);
    </script>
</body>
</html>
