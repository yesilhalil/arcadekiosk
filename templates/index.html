<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradoks Arcade Kiosk</title>
    <!-- Soket bağlantısı -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <!-- Arcade Fontları -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arcade-cyan: #00ffff;
            --arcade-magenta: #ff00ff;
            --arcade-yellow: #ffea00;
            --dark-bg: #05000a; /* Çizgilerin parlaması için zemin çok koyu bir mor-siyah yapıldı */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--dark-bg);
            /* 🔥 GERİ GETİRİLEN KESKİN MOR KARE DESENİ 🔥 */
            background-image: 
                linear-gradient(rgba(180, 0, 255, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180, 0, 255, 0.4) 1px, transparent 1px);
            background-size: 60px 60px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            box-sizing: border-box;
            /* Kareleri sonsuza kadar aşağı kaydıran pürüzsüz animasyon */
            animation: moveGrid 4s linear infinite;
        }

        @keyframes moveGrid {
            0% { background-position: 0px 0px; }
            100% { background-position: 0px 60px; }
        }

        .screen {
            display: none;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            width: 100%;
            height: 100%;
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            position: absolute;
            top: 0; left: 0;
            padding: 3vh 0;
            z-index: 10;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* --- BAŞLIKLAR --- */
        .title-arcade {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--arcade-yellow);
            text-shadow: 4px 4px 0px var(--arcade-magenta);
            margin: 0;
            letter-spacing: 2px;
        }

        .insert-coin {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            color: var(--arcade-cyan);
            animation: blink 1s step-end infinite;
            margin: 0;
            text-shadow: 2px 2px 0px #000;
            transition: opacity 0.3s;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* --- CANLI AYNA VE GERİ SAYIM --- */
        .mirror-container {
            position: relative;
            height: 68vh; 
            max-width: 95vw;
            aspect-ratio: 9/16; 
            border: 4px solid var(--arcade-cyan);
            border-radius: 15px;
            box-shadow: 0 0 20px var(--arcade-cyan), 0 0 40px var(--arcade-magenta) inset;
            background-color: #000;
            overflow: hidden;
            transform: translateZ(0); 
        }

        #live-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1) translateZ(0); 
        }

        .focus-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 55%; height: 45%;
            border: 2px dashed rgba(255, 234, 0, 0.6);
            border-radius: 20px;
            z-index: 3;
        }

        /* GERİ SAYIM ANİMASYONU */
        #countdown-display {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            color: var(--arcade-yellow);
            font-family: 'Press Start 2P', cursive;
            text-shadow: 6px 6px 0px var(--arcade-magenta), 0 0 30px #000;
            z-index: 20;
            animation: popIn 1s infinite;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* --- STİL BUTON REHBERİ --- */
        .style-guide {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .style-option {
            border: 2px solid var(--arcade-cyan);
            background: rgba(0, 0, 0, 0.6); /* Izgara arkadan görünmesin diye zemin koyulaştırıldı */
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        .btn-num {
            background: var(--arcade-magenta);
            color: var(--arcade-yellow);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            text-shadow: 1px 1px 0px #000;
        }

        /* --- İŞLENİYOR EKRANI --- */
        .loading-bar-container {
            width: 70%;
            height: 30px;
            border: 3px solid var(--arcade-cyan);
            border-radius: 15px;
            padding: 3px;
            background: rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--arcade-cyan), var(--arcade-magenta));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        #dynamic-text {
            font-size: 1.5rem;
            color: white;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--arcade-magenta);
            background: rgba(0,0,0,0.5); /* Yazı okunabilirliği artsın diye arkaya gölge atıldı */
            padding: 5px 15px;
            border-radius: 10px;
        }

        .style-badge {
            padding: 10px 20px;
            background: var(--arcade-magenta);
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            border-radius: 5px;
            border: 2px solid white;
            margin-bottom: 2vh;
        }

        /* --- SONUÇ EKRANI --- */
        .result-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1; 
            justify-content: space-evenly; 
            width: 100%;
            padding: 1vh 0;
        }

        #result-image {
            max-height: 65vh;
            width: auto;
            border: 5px solid #fff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
            border-radius: 15px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #result-image.loaded {
            opacity: 1;
            transform: scale(1);
        }

        /* QR PANELİ */
        .qr-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 20px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 25px;
            width: 85%;
            max-width: 600px;
            border: 5px solid var(--arcade-yellow);
            box-shadow: 0 10px 40px rgba(255, 0, 255, 0.5);
        }

        #qr-image {
            width: 140px; 
            height: 140px;
            border-radius: 5px;
        }

        .qr-text {
            color: #000;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .qr-text h3 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: var(--arcade-magenta);
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif; 
            font-weight: 900;
            letter-spacing: -1px;
        }

        .qr-text p {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            color: #222;
            font-family: 'Orbitron', sans-serif;
        }

        /* Flaş Efekti */
        #flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.1s ease-out;
        }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>

    <!-- 1. BEKLEME & CANLI AYNA -->
    <div id="idle-screen" class="screen active">
        <h1 class="title-arcade">PARADOKS</h1>
        
        <div class="mirror-container">
            <img id="live-stream" src="http://192.168.1.127:8080/video" alt="Kamera Bekleniyor">
            <div class="focus-box"></div>
            <div id="countdown-display">3</div>
        </div>

        <div class="style-guide">
            <div class="style-option"><span class="btn-num">1</span> CYBERPUNK</div>
            <div class="style-option"><span class="btn-num">2</span> RENAISSANCE</div>
            <div class="style-option"><span class="btn-num">3</span> GHIBLI</div>
        </div>

        <p class="insert-coin">STIL SEC VE BASLA</p>
    </div>

    <!-- 2. İŞLEM EKRANI -->
    <div id="processing-screen" class="screen">
        <div id="selected-style-display" class="style-badge">STIL: BEKLENIYOR...</div>
        
        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="loading-bar-container">
                <div class="loading-bar" id="progress-bar"></div>
            </div>
            <div id="dynamic-text">SISTEM BASLATILIYOR...</div>
        </div>
    </div>

    <!-- 3. SONUÇ EKRANI -->
    <div id="showing-screen" class="screen">
        <h2 class="title-arcade" style="font-size: 1.8rem; text-shadow: 2px 2px 0px var(--arcade-cyan);">MISSION COMPLETE</h2>
        
        <div class="result-layout">
            <img id="result-image" src="" alt="Paradoks Sonuç">
            
            <div class="qr-card">
                <img id="qr-image" src="" alt="QR Kod">
                <div class="qr-text">
                    <h3>FOTOĞRAFIN HAZIR!</h3>
                    <p>Telefon kameranı aç ve <br>barkodu okutarak kaydet.</p>
                </div>
            </div>
        </div>

        <p class="insert-coin" style="color: white; text-shadow: none; font-size: 0.8rem;">ANA MENU ICIN BUTONA BAS</p>
    </div>

    <script>
        const socket = io();

        const idleScreen = document.getElementById('idle-screen');
        const processingScreen = document.getElementById('processing-screen');
        const showingScreen = document.getElementById('showing-screen');
        const resultImage = document.getElementById('result-image');
        const qrImage = document.getElementById('qr-image');
        const dynamicText = document.getElementById('dynamic-text');
        const styleDisplay = document.getElementById('selected-style-display');
        const flashOverlay = document.getElementById('flash-overlay');
        const progressBar = document.getElementById('progress-bar');
        const countdownDisplay = document.getElementById('countdown-display');
        const insertCoinText = document.querySelector('.insert-coin');

        const loadingMessages = [
            "JETON ONAYLANDI...",
            "PIKSELLER YUKLENIYOR...",
            "YAPAY ZEKA DEVREDE...",
            "RENK PALETI SECILIYOR...",
            "SON ROTUSLAR..."
        ];
        
        let messageInterval;
        let progressInterval;

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startLoadingShow() {
            let i = 0;
            let percent = 0;
            
            dynamicText.innerText = loadingMessages[0];
            progressBar.style.width = "0%";

            messageInterval = setInterval(() => {
                i = (i + 1) % loadingMessages.length;
                dynamicText.innerText = loadingMessages[i];
            }, 2000); 

            progressInterval = setInterval(() => {
                if(percent < 90) {
                    percent += Math.random() * 5 + 2;
                    if(percent > 90) percent = 90;
                    progressBar.style.width = percent + "%";
                }
            }, 500);
        }

        function stopLoadingShow() {
            clearInterval(messageInterval);
            clearInterval(progressInterval);
        }

        function triggerFlash() {
            flashOverlay.style.opacity = '1';
            setTimeout(() => { flashOverlay.style.opacity = '0'; }, 150);
        }

        socket.on('start_countdown', function(data) {
            styleDisplay.innerText = "SECIM: " + data.style_name.toUpperCase();
            
            insertCoinText.style.opacity = '0';
            
            let count = 3;
            countdownDisplay.innerText = count;
            countdownDisplay.style.display = 'block';

            let countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownDisplay.innerText = count;
                } else if (count === 0) {
                    countdownDisplay.style.fontSize = "4rem"; 
                    countdownDisplay.innerText = "GULUMSE!";
                } else {
                    clearInterval(countInterval);
                    countdownDisplay.style.display = 'none';
                    countdownDisplay.style.fontSize = "8rem"; 
                    insertCoinText.style.opacity = '1'; 
                    
                    triggerFlash();

                    setTimeout(() => {
                        switchScreen('processing-screen');
                        startLoadingShow();
                        
                        socket.emit('capture_now', { buton_no: data.buton_no });
                    }, 200);
                }
            }, 1000); 
        });

        socket.on('state_update', function(data) {
            if (data.state === 'IDLE') {
                stopLoadingShow();
                resultImage.classList.remove('loaded');
                resultImage.src = "";
                qrImage.src = "";
                switchScreen('idle-screen');
            } 
            else if (data.state === 'SHOWING') {
                stopLoadingShow();
                progressBar.style.width = "100%"; 
                
                setTimeout(() => {
                    switchScreen('showing-screen');
                    
                    resultImage.src = data.image_url;
                    resultImage.onload = function() {
                        resultImage.classList.add('loaded');
                    }

                    const safeUrl = encodeURIComponent(data.qr_data);
                    qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + safeUrl;

                }, 500);
            }
        });
    </script>
</body>
</html>
